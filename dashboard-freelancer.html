<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace - Welcome Freelancer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="client-dash-body">
    <div class="client-dash-wrapper">
        <!-- Top Navigation -->
        <nav class="client-top-nav">
            <div class="top-nav-left">
                <i class="fa-solid fa-bars" id="sidebarToggle"></i>
                <div class="client-logo">
                    <h1 class="landing-logo">
                        <span class="text-skill">Skill</span><span class="text-space">Space.</span>
                    </h1>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="client-main-content">
            <div class="dash-main" style="padding-top: 100px;">
                <div class="welcome-text-container">
                    <h2 class="welcome-heading">Selamat Datang, Freelancer!</h2>
                    <h2 class="welcome-heading">Temukan Perjalanan Skillmu</h2>
                </div>
            </div>
        </main>
    </div>

    <!-- Offcanvas Sidebar Menu -->
    <div class="offcanvas-overlay" id="sidebarOverlay"></div>
    <aside class="offcanvas-sidebar sidebar" id="clientSidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <i class="fa-solid fa-bars" id="closeSidebar"></i>
        </div>
        <nav class="sidebar-nav">
            <a href="post-skill.html" class="sidebar-item">
                <i class="fa-solid fa-square-plus"></i>
                <span>Post Skill</span>
            </a>
            <a href="dashboard-pesanan.html" class="sidebar-item">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Dashboard Pesanan</span>
            </a>
            <a href="profil-freelancer.html" class="sidebar-item">
                <i class="fa-solid fa-user"></i>
                <span>Profil Freelancer</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="footer-home">
                <span>Home</span>
                <i class="fa-solid fa-house"></i>
            </a>
        </div>
    </aside>

    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const clientSidebar = document.getElementById('clientSidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        sidebarToggle.addEventListener('click', () => {
            clientSidebar.classList.add('open');
            sidebarOverlay.classList.add('show');
        });

        closeSidebar.addEventListener('click', () => {
            clientSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            clientSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });
    </script>
</body>
</html>
