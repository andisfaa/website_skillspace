<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace - Masuk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome untuk Icon Mata (Eye-slash) pada input password -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Penyesuaian khusus untuk halaman masuk sesuai desain (tanpa label) */
        .login-card-override {
            margin-top: 50px;
        }
        .login-logo {
            position: absolute;
            top: 40px;
            left: 50px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="register-container" style="position: relative;">
        <!-- Logo Kiri Atas -->
        <h1 class="landing-logo login-logo">
            <span class="text-skill" style="color: #0d4a36;">Skill</span><span class="text-space" style="color: #4b8b6b;">Space.</span>
        </h1>

        <div class="register-card login-card-override">
            <!-- Judul Halaman -->
            <h1 class="register-title">Masuk</h1>
            
            <form class="register-form">
                <!-- Input Email (Tanpa Label) -->
                <div class="form-group">
                    <input type="email" id="email" placeholder="example@gmail.com">
                </div>
                
                <!-- Input Password dengan Icon (Tanpa Label) -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="example123">
                        <i class="fa-solid fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                
                <!-- Teks Link Daftar -->
                <div class="login-link-container" style="text-align: right; margin-top: -5px; padding-right: 15px;">
                    <p class="login-text" style="font-size: 0.8rem;">Belum punya akun? <a href="daftar.html" class="login-link" style="color: #333; font-weight: 500;">Daftar</a></p>
                </div>
                
                <!-- Tombol Submit -->
                <div style="display: flex; justify-content: center; margin-top: 20px;">
                    <button type="button" onclick="window.location.href='pilih-role.html'" class="btn-outline btn-register">Masuk</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Interaktif JS -->
    <script>
        // Mengambil elemen icon dan input password
        const togglePassword = document.querySelector('.toggle-password');
        const passwordInput = document.querySelector('#password');

        // Menambahkan fungsi ketika ikon mata diklik
        togglePassword.addEventListener('click', function () {
            // Cek apakah tipenya password (sedang tertutup)
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Mengubah bentuk ikonnya dari coret (slash) menjadi mata terbuka dan sebaliknya
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });
    </script>
</body>
</html>
