<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace - Dashboard Pesanan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Menu</h2>
                <i class="fa-solid fa-bars" id="menu-icon-sidebar"></i>
            </div>
            
            <nav class="sidebar-nav">
                <a href="post-skill.html" class="sidebar-item">
                    <i class="fa-solid fa-square-plus"></i>
                    <span>Post Skill</span>
                </a>
                <a href="dashboard-pesanan.html" class="sidebar-item active">
                    <i class="fa-solid fa-chart-simple"></i>
                    <span>Dashboard</span>
                </a>
                <a href="profil-freelancer.html" class="sidebar-item">
                    <i class="fa-solid fa-user"></i>
                    <span>Profil</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="homepage.html" class="sidebar-item home-item">
                    <span>Home</span>
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="sidebar-main-content">
            <div class="dp-inner-container">
                <!-- Header Dashboard Pesanan -->
                <div class="dp-header-section">
                    <i class="fa-solid fa-clipboard-list dp-header-icon"></i>
                    <div class="dp-header-text">
                        <h2 class="dp-title">Dashboard Pesanan</h2>
                        <p class="dp-subtitle">Kelola semua pesanan jasa yang Anda buat</p>
                    </div>
                </div>

                <!-- Status Cards -->
                <div class="dp-status-cards">
                    <div class="status-card sc-semua active" onclick="filterStatus('all', this)">
                        <i class="fa-solid fa-bag-shopping sc-icon"></i>
                        <div class="sc-info">
                            <span class="sc-label">Semua Pesanan</span>
                            <strong class="sc-value" id="count-all">0</strong>
                        </div>
                    </div>
                    <div class="status-card sc-diproses" onclick="filterStatus('Diproses', this)">
                        <i class="fa-regular fa-clock sc-icon"></i>
                        <div class="sc-info">
                            <span class="sc-label">Diproses</span>
                            <strong class="sc-value" id="count-diproses">0</strong>
                        </div>
                    </div>
                    <div class="status-card sc-selesai" onclick="filterStatus('Selesai', this)">
                        <i class="fa-regular fa-circle-check sc-icon"></i>
                        <div class="sc-info">
                            <span class="sc-label">Selesai</span>
                            <strong class="sc-value" id="count-selesai">0</strong>
                        </div>
                    </div>
                    <div class="status-card sc-dibatalkan" onclick="filterStatus('Dibatalkan', this)">
                        <i class="fa-regular fa-circle-xmark sc-icon"></i>
                        <div class="sc-info">
                            <span class="sc-label">Dibatalkan</span>
                            <strong class="sc-value" id="count-dibatalkan">0</strong>
                        </div>
                    </div>
                </div>

                <!-- Tabel Pesanan -->
                <div class="dp-table-container">
                    <table class="dp-table">
                        <thead>
                            <tr>
                                <th style="text-align: left;">Nama Jasa</th>
                                <th>Klien</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody">
                            <!-- Data akan diisi via JavaScript -->
                        </tbody>
                    </table>

                    <!-- Pagination -->
                    <div id="pagination-wrapper" class="dp-pagination-container">
                        <span id="showingText" class="dp-showing-text">Menampilkan 0 dari 0 pesanan</span>
                        <div class="dp-pagination">
                            <span class="dp-page-num" onclick="changePage(1)" id="page-1">1</span>
                            <span class="dp-page-num" onclick="changePage(2)" id="page-2">2</span>
                            <span class="dp-page-num" onclick="changePage(3)" id="page-3">3</span>
                            <span class="dp-page-num"><i class="fa-solid fa-chevron-right"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Interaktif JS -->
    <script>
        // Sidebar Toggle
        const sidebar = document.querySelector('.sidebar');
        const menuIconSidebar = document.querySelector('#menu-icon-sidebar');
        
        menuIconSidebar.addEventListener('click', function () {
            sidebar.classList.toggle('collapsed');
        });

        // Data Pesanan berdasarkan Screenshot
        const orders = [
            // Halaman 1
            { page: 1, title: 'Copywriting - Jasa', pack: 'Paket Premium', client: 'Naura Khairani', date: '12 April 2026', status: 'Diproses', icon: 'fa-laptop-code', avatar: 'Nabila.PNG' },
            { page: 1, title: 'Web Ui/Ux', pack: 'Paket Premium', client: 'Elvano Pradipta', date: '19 April 2026', status: 'Diproses', icon: 'fa-laptop-code', avatar: 'Adrian fernando.PNG' },
            { page: 1, title: 'Editing Videografi', pack: 'Paket Premium', client: 'Zayyan Fadhil', date: '21 April 2026', status: 'Diproses', icon: 'fa-video', avatar: 'Adrian pratama.PNG' },
            { page: 1, title: 'Web Ui/Ux', pack: 'Paket Premium', client: 'Arsenio Mahardika', date: '22 April 2026', status: 'Selesai', icon: 'fa-laptop-code', avatar: 'Athaya kaivano.PNG' },
            { page: 1, title: 'Data Entry', pack: 'Paket Premium', client: 'Kayla Anindita', date: '22 April 2026', status: 'Selesai', icon: 'fa-keyboard', avatar: 'Amanda Praama.PNG' },
            
            // Halaman 2
            { page: 2, title: 'Voice Over', pack: 'Paket Premium', client: 'Devan Malik', date: '24 April 2026', status: 'Selesai', icon: 'fa-microphone', avatar: 'Dimas.PNG' },
            { page: 2, title: 'Data Entry', pack: 'Paket Premium', client: 'Mirella Octaviani', date: '25 April 2026', status: 'Dibatalkan', icon: 'fa-keyboard', avatar: 'Keisya.PNG' },
            { page: 2, title: 'Voice Over', pack: 'Paket Premium', client: 'Calista Azzura', date: '27 April 2026', status: 'Selesai', icon: 'fa-microphone', avatar: 'Celine.PNG' },
            
            // Data tambahan untuk melengkapi jumlah 12
            { page: 3, title: 'Desain Logo', pack: 'Paket Premium', client: 'Rafli Mahendra', date: '29 April 2026', status: 'Selesai', icon: 'fa-pen-nib', avatar: 'Kevin.PNG' },
            { page: 3, title: 'UI Design', pack: 'Paket Basic', client: 'Andika Putra', date: '30 April 2026', status: 'Selesai', icon: 'fa-laptop-code', avatar: 'Andika Putra.PNG' },
            { page: 3, title: 'Data Scraping', pack: 'Paket Premium', client: 'Shania Putri', date: '01 Mei 2026', status: 'Selesai', icon: 'fa-keyboard', avatar: 'Shania putri.PNG' },
            { page: 3, title: 'Video Editing', pack: 'Paket Basic', client: 'Dimas Putra', date: '02 Mei 2026', status: 'Dibatalkan', icon: 'fa-video', avatar: 'Dimas Putra.PNG' }
        ];

        let currentStatusFilter = 'all';
        let currentPage = 1;

        function updateCounts() {
            document.getElementById('count-all').innerText = orders.length;
            document.getElementById('count-diproses').innerText = orders.filter(o => o.status === 'Diproses').length;
            document.getElementById('count-selesai').innerText = orders.filter(o => o.status === 'Selesai').length;
            document.getElementById('count-dibatalkan').innerText = orders.filter(o => o.status === 'Dibatalkan').length;
        }

        function filterStatus(status, element) {
            currentStatusFilter = status;
            currentPage = 1; // Reset ke halaman 1 saat filter berubah
            
            // Update UI kartu aktif
            document.querySelectorAll('.status-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            
            renderOrders();
        }

        function changePage(num) {
            currentPage = num;
            renderOrders();
        }

        function renderOrders() {
            const tbody = document.getElementById('orderTableBody');
            const showingText = document.getElementById('showingText');
            const paginationWrapper = document.getElementById('pagination-wrapper');
            tbody.innerHTML = '';

            // Filter data
            let filteredOrders = orders;
            if (currentStatusFilter !== 'all') {
                filteredOrders = orders.filter(o => o.status === currentStatusFilter);
            }

            // Jika filter aktif, kita tampilkan semua yang cocok (tanpa pagination per page asli) 
            // atau tetap gunakan pagination jika datanya banyak. 
            // Untuk tugas ini, jika filter aktif kita tampilkan semua agar simple, 
            // tapi jika 'all' kita gunakan pagination page 1-3.
            
            let displayOrders = filteredOrders;
            if (currentStatusFilter === 'all') {
                displayOrders = filteredOrders.filter(o => o.page === currentPage);
                paginationWrapper.style.display = 'flex';
            } else {
                paginationWrapper.style.display = 'none'; // Sembunyikan pagination saat filter aktif
            }
            
            displayOrders.forEach(order => {
                const statusClass = order.status.toLowerCase();
                const row = `
                    <tr>
                        <td>
                            <div class="dp-jasa-cell">
                                <div class="dp-jasa-img-placeholder"><i class="fa-solid ${order.icon}"></i></div>
                                <div class="dp-jasa-details">
                                    <strong>${order.title}</strong>
                                    <span>${order.pack}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="dp-client-cell">
                                <div class="dp-client-avatar">
                                    <img src="${order.avatar}" alt="${order.client}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                                </div>
                                <span>${order.client}</span>
                            </div>
                        </td>
                        <td class="dp-center">${order.date}</td>
                        <td class="dp-center"><span class="dp-pill pill-${statusClass}">${order.status}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Update Pagination UI
            if (currentStatusFilter === 'all') {
                document.querySelectorAll('.dp-page-num').forEach(el => el.classList.remove('active'));
                const activePageEl = document.getElementById(`page-${currentPage}`);
                if (activePageEl) activePageEl.classList.add('active');
            }
            
            showingText.innerText = `Menampilkan ${displayOrders.length} dari ${filteredOrders.length} pesanan`;
        }

        // Inisialisasi awal
        updateCounts();
        renderOrders();
    </script>
</body>
</html>
